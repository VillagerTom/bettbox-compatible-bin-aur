name: Update AUR package

on:
  push:
    branches:
      - master
    paths-ignore:
      - '.github/**'
  schedule:
    - cron: '30 4,16 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: Force update even if version is the same
        required: false
        type: boolean
        default: false

permissions: {}

concurrency:
  group: update-aur
  cancel-in-progress: false

jobs:
  update-version:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check for new upstream release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Find the latest non-draft stable release with a compatible Linux deb
          latest_tag=""
          while IFS= read -r tag; do
            # skip pre-release tags (contain '-pre')
            case "$tag" in *-pre*) continue ;; esac
            asset_count=$(gh release view "$tag" \
              --repo appshubcc/Bettbox \
              --json assets \
              --jq '[.assets[] | select(.name | contains("linux-amd64-compatible"))] | length')
            if [ "$asset_count" -gt 0 ]; then
              latest_tag="$tag"
              break
            fi
          done < <(gh release list \
            --repo appshubcc/Bettbox \
            --limit 30 \
            --json tagName,isDraft \
            --jq '.[] | select(.isDraft == false) | .tagName')

          if [ -z "$latest_tag" ]; then
            echo "No upstream stable releases with compatible deb found"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest upstream tag: $latest_tag"

          upstream_ver="${latest_tag#v}"
          # Convert pre-release format: 1.17.10-pre1 -> 1.17.10.pre1
          # arch_ver="$(echo "$upstream_ver" | sed 's/-pre/.pre/; s/-/.pre/')"

          cur_ver="$(sed -n 's/^pkgver=//p' PKGBUILD)"
          echo "cur_ver=$cur_ver  upstream_ver=$upstream_ver"

          if [ "$upstream_ver" = "$cur_ver" ] && [ "${{ inputs.force }}" != "true" ]; then
            echo "Version unchanged, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "new_version=$upstream_ver" >> "$GITHUB_OUTPUT"
            echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PKGBUILD and .SRCINFO
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VER: ${{ steps.check.outputs.new_version }}
          TAG: ${{ steps.check.outputs.latest_tag }}
        run: |
          set -euo pipefail

          pkgname="bettbox-compatible-bin"
          _pkgname="Bettbox"
          arch="x86_64"

          # --- Get SHA256 of the compatible .deb via API ---
          deb_sha256="$(gh release view "$TAG" \
            --repo appshubcc/Bettbox \
            --json assets \
            --jq '[.assets[] | select(.name | contains("linux-amd64-compatible.deb")) | .digest] | first' | \
            sed 's/^sha256://')"
          echo "deb SHA256: $deb_sha256"

          # --- Patch PKGBUILD ---
          sed -i \
            -e "s/^pkgver=.*/pkgver=${NEW_VER}/" \
            -e "s/^pkgrel=.*/pkgrel=1/" \
            -e "s|^provides=(\"${pkgname%-compatible-bin}=.*\")|provides=(\"${pkgname%-compatible-bin}=${NEW_VER}\")|" \
            -e "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${deb_sha256}')/" \
            PKGBUILD
          echo "=== Updated PKGBUILD ==="
          grep -E '^(pkgver|pkgrel|provides|sha256)' PKGBUILD

          # --- Generate .SRCINFO from PKGBUILD ---
          # Source PKGBUILD (rename 'source' array to avoid bash conflict)
          sed 's/^\(source\(_x86_64\)\?\)=/_\1=/' PKGBUILD > /tmp/pkgbuild_srcinfo.sh
          source /tmp/pkgbuild_srcinfo.sh
          {
            echo "pkgbase = ${pkgname}"
            echo "	pkgdesc = ${pkgdesc}"
            echo "	pkgver = ${pkgver}"
            echo "	pkgrel = ${pkgrel}"
            echo "	url = ${url}"
            for a in "${arch[@]}"; do echo "	arch = $a"; done
            for l in "${license[@]}"; do echo "	license = $l"; done
            for d in "${depends[@]}"; do echo "	depends = $d"; done
            for p in "${provides[@]}"; do echo "	provides = $p"; done
            for c in "${conflicts[@]}"; do echo "	conflicts = $c"; done
            for o in "${options[@]}"; do echo "	options = $o"; done
            for s in "${_source[@]}"; do echo "	source = $s"; done
            for s in "${sha256sums[@]}"; do echo "	sha256sums = $s"; done
            for s in "${_source_x86_64[@]}"; do echo "	source_x86_64 = $s"; done
            for s in "${sha256sums_x86_64[@]}"; do echo "	sha256sums_x86_64 = $s"; done
            echo "pkgname = ${pkgname}"
            echo ""
          } >| .SRCINFO
          echo "=== Generated .SRCINFO ==="
          cat .SRCINFO

      - name: Commit back to this repo
        if: steps.check.outputs.skip == 'false'
        env:
          NEW_VER: ${{ steps.check.outputs.new_version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update to v${NEW_VER}"
            git push
          fi

      - name: Push to AUR
        if: steps.check.outputs.skip == 'false'
        uses: ./.github/actions/push-to-aur
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit-message: Update to v${{ steps.check.outputs.new_version }}

  push-modifications:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure pkgrel changed
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          # Check there is a diff in PKGBUILD or .SRCINFO
          git diff "$BEFORE" "$AFTER" -- PKGBUILD .SRCINFO > /dev/null 2>&1 || {
            echo "Error: no changes to PKGBUILD or .SRCINFO in this push"
            exit 1
          }

          # Extract the new pkgrel value from each file
          pkgrel_pkgbuild=$(git diff "$BEFORE" "$AFTER" -- PKGBUILD | sed -n 's/^+pkgrel=//p')
          pkgrel_srcinfo=$(git diff "$BEFORE" "$AFTER" -- .SRCINFO | sed -n 's/^+[[:space:]]*pkgrel[[:space:]]*=[[:space:]]*//p')

          # Verify both files modified pkgrel
          [ -n "$pkgrel_pkgbuild" ] || { echo "Error: pkgrel not modified in PKGBUILD"; exit 1; }
          [ -n "$pkgrel_srcinfo" ] || { echo "Error: pkgrel not modified in .SRCINFO"; exit 1; }

          # Verify they match
          [ "$pkgrel_pkgbuild" = "$pkgrel_srcinfo" ] || {
            echo "Error: pkgrel mismatch — PKGBUILD has '$pkgrel_pkgbuild', .SRCINFO has '$pkgrel_srcinfo'"
            exit 1
          }

          echo "pkgrel consistency check passed: pkgrel=$pkgrel_pkgbuild"

      - name: Push to AUR
        uses: ./.github/actions/push-to-aur
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit-message: ${{ join(github.event.commits.*.message, '\n---\n') }}