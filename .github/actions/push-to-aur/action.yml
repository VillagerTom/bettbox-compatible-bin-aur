name: Push files to AUR git repo
description: Clone the AUR package repo and push the current workspace files

inputs:
  ssh-private-key:
    description: SSH private key for aur.archlinux.org
    required: true
  package-name:
    description: AUR package name
    required: false
    default: bettbox-compatible-bin
  commit-message:
    description: Git commit message
    required: true
  user-name:
    description: Git user name
    required: false
    default: VillagerTom
  user-email:
    description: Git user email
    required: false
    default: villager-tom@proton.me

runs:
  using: composite
  steps:
    - name: Push to AUR
      shell: bash
      env:
        AUR_SSH_PRIVATE_KEY: ${{ inputs.ssh-private-key }}
        AUR_PKGNAME: ${{ inputs.package-name }}
        AUR_COMMIT_MSG: ${{ inputs.commit-message }}
        AUR_USER_NAME: ${{ inputs.user-name }}
        AUR_USER_EMAIL: ${{ inputs.user-email }}
      run: |
        set -euo pipefail
        cd "$GITHUB_WORKSPACE"

        mkdir -p -m 0700 ~/.ssh
        ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
        echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
        chmod 600 ~/.ssh/aur

        tmpdir="$(mktemp -d)"
        GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o IdentitiesOnly=yes" \
          git clone "ssh://aur@aur.archlinux.org/${AUR_PKGNAME}.git" "$tmpdir/aur"

        find "$tmpdir/aur" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
        rsync -av --exclude '.git' --exclude '.github' ./ "$tmpdir/aur/"

        cd "$tmpdir/aur"
        git config user.name "$AUR_USER_NAME"
        git config user.email "$AUR_USER_EMAIL"

        git add -A

        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "$AUR_COMMIT_MSG"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o IdentitiesOnly=yes" git push
        fi

        rm -rf "$tmpdir"
